        @for (item of destaques; track $index) {

            <app-card-product [product]="item"></app-card-product>

        }
    </div>-->
    
  <swiper-container class="mySwiper" pagination="true" pagination-dynamic-bullets="true">

        @for (item of destaques; track $index) {

          <swiper-slide>
            <div class="bg-black w-full h-[400px] gap-4">
              <div class="container mx-auto flex justify-between items-center">
              <div class="flex flex-col items-start max-w-[550px] gap-4">
                <h1 class="text-white text-xl xl:text-5xl">{{item.name}}</h1>
                <p class="text-white text-start">{{item.description | slice:0:120 }}...</p>

              </div>
              <img src="{{item.imageUrl}}" alt="{{item.name}}" class="w-auto h-[400px] object-contain">
              </div>
            </div>
          </swiper-slide>
        }
    
  </swiper-container>

<swiper-container
  class="mySwiper-thumbs mt-2"
  space-between="10"
  slides-per-view="3"
  free-mode="true"
  watch-slides-progress="true"
>
</swiper-container>
</div>
